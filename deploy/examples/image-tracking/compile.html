<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR Compiler (Production)</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.7.2/min/dropzone.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.7.2/dropzone.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- Use the IIFE build that exposes window.MINDAR.IMAGE.Compiler -->
    <script src="../../mindar-image-aframe.prod.js"></script>

    <script>
      Dropzone.autoDiscover = false;
      
      function initCompiler() {
        if (window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.Compiler) {
          console.log('MindAR loaded, creating compiler...');
          const compiler = new window.MINDAR.IMAGE.Compiler();
          console.log('Compiler created successfully');
          return compiler;
        } else {
          console.log('MindAR not ready yet, retrying...');
          setTimeout(initCompiler, 100);
        }
      }

      let compiler = initCompiler();

      const download = (buffer) => {
        const blob = new Blob([buffer]);
        const aLink = document.createElement('a');
        aLink.download = 'targets.mind';
        aLink.href = window.URL.createObjectURL(blob);
        aLink.click();
        window.URL.revokeObjectURL(aLink.href);
      }

      const showData = (data) => {
        for (let i = 0; i < data.trackingImageList.length; i++) {
          const image = data.trackingImageList[i];
          const points = data.trackingData[i].points.map((p) => ({ x: Math.round(p.x), y: Math.round(p.y) }));
          showImage(image, points);
        }

        for (let i = 0; i < data.imageList.length; i++) {
          const image = data.imageList[i];
          const kpmPoints = [...data.matchingData[i].maximaPoints, ...data.matchingData[i].minimaPoints];
          const points2 = kpmPoints.map((kp) => ({ x: Math.round(kp.x), y: Math.round(kp.y) }));
          showImage(image, points2);
        }
      }

      const showImage = (targetImage, points) => {
        const container = document.getElementById("container");
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);
        canvas.width  = targetImage.width;
        canvas.height = targetImage.height;
        canvas.style.width = canvas.width + 'px';
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = new Uint32Array(imageData.data.buffer);

        const alpha = (0xff << 24);
        for (let c = 0; c < targetImage.width; c++) {
          for (let r = 0; r < targetImage.height; r++) {
            const pix = targetImage.data[r * targetImage.width + c];
            data[r * canvas.width + c] = alpha | (pix << 16) | (pix << 8) | pix;
          }
        }

        const green = (0xff << 24) | (0x00 << 16) | (0xff << 8) | 0x00;
        for (let i=0; i < points.length; ++i) {
          const x = points[i].x;
          const y = points[i].y;
          const offset = (x + y * canvas.width);
          data[offset] = green;
          for (let size = 1; size <= 6; size++) {
            data[offset-size] = green;
            data[offset+size] = green;
            data[offset-size*canvas.width] = green;
            data[offset+size*canvas.width] = green;
          }
        }
        ctx.putImageData(imageData, 0, 0);
      }

      const loadImage = async (file) => {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = URL.createObjectURL(file);
        });
      }

      const compileFiles = async (files) => {
        if (!compiler) {
          compiler = initCompiler();
          if (!compiler) {
            alert('Compiler not ready. Please refresh the page.');
            return;
          }
        }

        const images = [];
        for (let i = 0; i < files.length; i++) {
          images.push(await loadImage(files[i]));
        }
        const start = Date.now();
        const dataList = await compiler.compileImageTargets(images, (progress) => {
          document.getElementById("progress").textContent = 'progress: ' + progress.toFixed(2) + "%";
        });
        console.log('exec time compile: ', Date.now() - start);
        for (let i = 0; i < dataList.length; i++) {
          showData(dataList[i]);
        }
        const exportedBuffer = await compiler.exportData();
        document.getElementById("downloadButton").onclick = function () {
          download(exportedBuffer);
        };
      }

      const loadMindFile = async (file) => {
        if (!compiler) {
          compiler = initCompiler();
          if (!compiler) {
            alert('Compiler not ready. Please refresh the page.');
            return;
          }
        }

        const reader = new FileReader();
        reader.onload = function () {
          const dataList = compiler.importData(this.result);
          for (let i = 0; i < dataList.length; i++) {
            showData(dataList[i]);
          }
        }
        reader.readAsArrayBuffer(file);
      }

      document.addEventListener('DOMContentLoaded', function () {
        const myDropzone = new Dropzone("#dropzone", { url: "#", autoProcessQueue: false, addRemoveLinks: true });

        document.getElementById("startButton").addEventListener("click", function () {
          const files = myDropzone.files;
          if (files.length === 0) return;
          const ext = files[0].name.split('.').pop();
          if (ext === 'mind') {
            loadMindFile(files[0]);
          } else {
            compileFiles(files);
          }
        });
      });
    </script>

    <style>
      #container {
        display: flex;
        flex-direction: column;
      }
      #dropzone {
        border: 2px dashed #ccc;
        border-radius: 4px;
        padding: 20px;
        text-align: center;
        background: #f9f9f9;
        min-height: 100px;
        margin: 10px 0;
      }
      #dropzone.dz-drag-hover {
        border-color: #000;
        background: #e1e1e1;
      }
      .dz-message { margin: 2em 0; }
    </style>
  </head>
  <body>
    <div>
      <p>Usage:</p>
      <ol>
        <li>Drop target images (e.g. .png) into the drop zone. (can drop multiple)</li>
        <li>Click "Start". It could take a while (especially for large image)</li>
        <li>When done, some debug images will show with feature points visualized.</li>
        <li>Click "Download" to get a targets.mind file for AR webpages</li>
      </ol>
    </div>
    <button id="startButton">Start</button>
    <button id="downloadButton">Download</button>
    <span id="progress"></span>
    <div id="dropzone" class="dropzone"></div>
    <div id="container"></div>
  </body>
</html>
